name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HKVM_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${{ secrets.HKVM_PORT }}" "${{ secrets.HKVM_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy static files
        run: |
          rsync -az --delete \
            --exclude ".git" \
            --exclude ".github" \
            --exclude "photos.md" \
            --exclude "scripts" \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.HKVM_PORT }}" \
            ./ ${{ secrets.HKVM_USER }}@${{ secrets.HKVM_HOST }}:/photos
