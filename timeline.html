<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f7f7f4">
  <title>Photo Notes · Timeline</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg: #f7f7f4;
      --ink: #171717;
      --muted: #6f6f6a;
      --faint: #a8a8a1;
      --line: #dfded8;
      --mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      --sans: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--sans);
      letter-spacing: 0;
    }

    img {
      display: block;
      max-width: 100%;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    figure {
      margin: 0;
    }

    .page {
      width: min(100%, 820px);
      margin: 0 auto;
      padding: 32px 20px 64px;
    }

    .site-head {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 18px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      font-weight: 720;
      line-height: 1.15;
      letter-spacing: 0;
    }

    .site-meta,
    .nav-link,
    .foot {
      color: var(--faint);
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.4;
    }

    .site-meta {
      margin-top: 6px;
    }

    .nav-link:hover {
      color: var(--ink);
    }

    .feed {
      display: grid;
      gap: 50px;
      padding-top: 28px;
    }

    .post {
      display: grid;
      grid-template-columns: 92px minmax(0, 1fr);
      gap: 22px;
      align-items: start;
    }

    .date {
      position: sticky;
      top: 24px;
      color: var(--faint);
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.45;
    }

    .entry {
      min-width: 0;
      border-bottom: 1px solid var(--line);
      padding-bottom: 38px;
    }

    .entry h2 {
      margin: 0;
      font-size: 18px;
      font-weight: 680;
      line-height: 1.28;
      letter-spacing: 0;
    }

    .entry-note {
      max-width: 620px;
      margin-top: 8px;
      margin-bottom: 18px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.72;
    }

    .photos {
      display: grid;
      gap: 24px;
    }

    .photo {
      min-width: 0;
    }

    .photo img {
      width: 100%;
      max-height: 780px;
      border-radius: 4px;
      background: #e5e4df;
      object-fit: cover;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 10px;
      margin-top: 7px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .meta span + span::before {
      content: "/";
      margin-right: 10px;
      color: var(--faint);
    }

    .foot {
      padding-top: 12px;
    }

    @media (max-width: 680px) {
      .page {
        padding: 26px 16px 48px;
      }

      .site-head {
        align-items: flex-start;
        flex-direction: column;
        gap: 12px;
        padding-bottom: 16px;
      }

      .post {
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .date {
        position: static;
      }

      .entry {
        padding-bottom: 34px;
      }

      .photo img {
        max-height: none;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="site-head">
      <div>
        <h1>Photo Notes</h1>
        <div class="site-meta">TIMELINE</div>
      </div>
      <a class="nav-link" href="index.html">OVERVIEW</a>
    </header>

    <section class="feed" id="feed" aria-label="照片时间线"></section>

    <footer class="foot">Photo Notes</footer>
  </main>

  <script src="data.js"></script>
  <script>
    const feed = document.querySelector('#feed');

    feed.innerHTML = window.photoEntries.map((entry, entryIndex) => `
      <article class="post">
        <time class="date" datetime="${entry.date.replaceAll('.', '-')}">${entry.date}<br>${entry.photos.length} photos</time>
        <div class="entry">
          <h2>${entry.title}</h2>
          <div class="meta" aria-label="拍摄信息">
            <span>${entry.location}</span>
            <span>${entry.camera}</span>
          </div>
          <div class="entry-note">${entry.description}</div>
          <div class="photos">
            ${entry.photos.map((photo, photoIndex) => `
              <figure class="photo" id="photo-${entryIndex}-${photoIndex}">
                <img src="${photo.src}" alt="${photo.alt}" loading="${entryIndex < 1 ? 'eager' : 'lazy'}">
              </figure>
            `).join('')}
          </div>
        </div>
      </article>
    `).join('');
  </script>
</body>
</html>
