<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f7f7f4">
  <title>Photo Notes</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg: #f7f7f4;
      --ink: #171717;
      --muted: #6f6f6a;
      --faint: #a8a8a1;
      --line: #dfded8;
      --mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      --sans: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--sans);
      letter-spacing: 0;
    }

    button {
      border: 0;
      font: inherit;
      cursor: pointer;
    }

    img {
      display: block;
      max-width: 100%;
    }

    .page {
      width: min(100%, 780px);
      margin: 0 auto;
      padding: 32px 20px 64px;
    }

    .site-head {
      border-bottom: 1px solid var(--line);
      padding-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      font-weight: 720;
      line-height: 1.15;
      letter-spacing: 0;
    }

    .site-meta {
      margin-top: 6px;
      color: var(--faint);
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.4;
    }

    .feed {
      display: grid;
      gap: 44px;
      padding-top: 28px;
    }

    .post {
      display: grid;
      grid-template-columns: 86px minmax(0, 1fr);
      gap: 22px;
      align-items: start;
    }

    .date {
      position: sticky;
      top: 24px;
      color: var(--faint);
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.45;
    }

    .entry {
      min-width: 0;
      border-bottom: 1px solid var(--line);
      padding-bottom: 38px;
    }

    .entry img {
      width: 100%;
      max-height: 780px;
      border-radius: 4px;
      background: #e5e4df;
      object-fit: cover;
    }

    .entry h2 {
      margin: 14px 0 0;
      font-size: 18px;
      font-weight: 680;
      line-height: 1.28;
      letter-spacing: 0;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 10px;
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .meta span + span::before {
      content: "/";
      margin-right: 10px;
      color: var(--faint);
    }

    .foot {
      padding-top: 12px;
      color: var(--faint);
      font-family: var(--mono);
      font-size: 12px;
    }

    @media (max-width: 680px) {
      .page {
        padding: 26px 16px 48px;
      }

      .site-head {
        padding-bottom: 16px;
      }

      .post {
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .date {
        position: static;
      }

      .entry {
        padding-bottom: 34px;
      }

      .entry img {
        max-height: none;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="site-head">
      <h1>Photo Notes</h1>
      <div class="site-meta">RECENT PHOTOS</div>
    </header>

    <section class="feed" id="feed" aria-label="照片时间线"></section>

    <footer class="foot">Photo Notes</footer>
  </main>

  <script>
    const photos = [
      {
        title: '巷口的雨停了',
        date: '2026.06.12',
        tagLabel: '街头',
        location: '上海 · 武康路',
        camera: 'Fujifilm X100VI',
        src: 'https://picsum.photos/seed/photo-stream-after-rain-street/1400/1050',
        alt: '雨后街道路面反光与行人'
      },
      {
        title: '山腰的风',
        date: '2026.05.30',
        tagLabel: '自然',
        location: '浙江 · 莫干山',
        camera: 'Sony A7C II',
        src: 'https://picsum.photos/seed/photo-stream-mountain-wind/1400/1100',
        alt: '山坡树木与低云'
      },
      {
        title: '夜车窗口',
        date: '2026.05.18',
        tagLabel: '夜晚',
        location: '杭州 · 东站',
        camera: 'Ricoh GR IIIx',
        src: 'https://picsum.photos/seed/photo-stream-night-train-window/1400/1000',
        alt: '夜晚列车窗口与站台灯光倒影'
      },
      {
        title: '海边白墙',
        date: '2026.04.27',
        tagLabel: '旅行',
        location: '福建 · 平潭',
        camera: 'Nikon Zf',
        src: 'https://picsum.photos/seed/photo-stream-white-wall-sea/1400/1100',
        alt: '海边白墙与清晰阴影'
      },
      {
        title: '便利店门口',
        date: '2026.04.03',
        tagLabel: '街头',
        location: '上海 · 长乐路',
        camera: 'Leica Q3',
        src: 'https://picsum.photos/seed/photo-stream-convenience-store/1400/1000',
        alt: '夜晚便利店门口与行人'
      },
      {
        title: '湖面没有风',
        date: '2026.03.21',
        tagLabel: '自然',
        location: '江苏 · 苏州',
        camera: 'Canon R6 II',
        src: 'https://picsum.photos/seed/photo-stream-still-lake/1400/1050',
        alt: '平静湖面与远处树影'
      }
    ];

    const feed = document.querySelector('#feed');

    function render() {
      feed.innerHTML = photos.map((photo, index) => `
        <article class="post">
          <time class="date" datetime="${photo.date.replaceAll('.', '-')}">${photo.date}<br>${photo.tagLabel}</time>
          <div class="entry">
            <img src="${photo.src}" alt="${photo.alt}" loading="${index < 2 ? 'eager' : 'lazy'}">
            <h2>${photo.title}</h2>
            <div class="meta" aria-label="拍摄信息">
              <span>${photo.location}</span>
              <span>${photo.camera}</span>
            </div>
          </div>
        </article>
      `).join('');
    }

    render();
  </script>
</body>
</html>
