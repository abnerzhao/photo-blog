<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f7f7f4">
  <title>Abner Zhao Photos</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg: #f7f7f4;
      --ink: #171717;
      --muted: #6f6f6a;
      --faint: #a8a8a1;
      --line: #dfded8;
      --chip: #e9e9e3;
      --mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      --sans: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--sans);
      letter-spacing: 0;
    }

    img {
      display: block;
      max-width: 100%;
    }

    button {
      border: 0;
      font: inherit;
      cursor: pointer;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      width: min(100%, 1180px);
      margin: 0 auto;
      padding: 32px 20px 64px;
    }

    .site-head {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 18px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      font-weight: 720;
      line-height: 1.15;
      letter-spacing: 0;
    }

    .site-meta,
    .nav-link,
    .foot {
      color: var(--faint);
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.4;
    }

    .site-meta {
      margin-top: 6px;
    }

    .nav-link:hover {
      color: var(--ink);
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 184px;
      gap: 24px;
      align-items: start;
      padding-top: 22px;
    }

    .overview {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 6px;
    }

    .overview a {
      display: block;
      overflow: hidden;
      border-radius: 3px;
      background: #e5e4df;
      aspect-ratio: 1;
    }

    .overview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: opacity 140ms ease;
    }

    .overview a:hover img {
      opacity: 0.78;
    }

    .filters {
      position: sticky;
      top: 18px;
      display: grid;
      gap: 24px;
      align-content: start;
    }

    .filter-group {
      display: grid;
      gap: 8px;
    }

    .filter-title {
      color: var(--ink);
      font-family: var(--mono);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .filter-options {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .filter-button {
      min-height: 24px;
      border-radius: 6px;
      background: var(--chip);
      color: var(--muted);
      padding: 0 7px;
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 700;
      line-height: 1;
      transition: background 140ms ease, color 140ms ease;
    }

    .filter-button:hover,
    .filter-button.is-active {
      background: var(--ink);
      color: #fff;
    }

    .summary {
      color: var(--faint);
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.4;
    }

    .foot {
      border-top: 1px solid var(--line);
      margin-top: 28px;
      padding-top: 14px;
    }

    @media (max-width: 680px) {
      .page {
        padding: 26px 16px 48px;
      }

      .site-head {
        align-items: flex-start;
        flex-direction: column;
        gap: 12px;
        padding-bottom: 16px;
      }

      .layout {
        grid-template-columns: 1fr;
        gap: 18px;
        padding-top: 18px;
      }

      .overview {
        grid-template-columns: repeat(3, 1fr);
        gap: 5px;
      }

      .filters {
        position: static;
        order: -1;
        gap: 14px;
      }

      .filter-group {
        gap: 7px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="site-head">
      <div>
        <h1>Abner Zhao Photos</h1>
        <div class="site-meta">OVERVIEW</div>
      </div>
      <a class="nav-link" href="timeline.html">TIMELINE</a>
    </header>

    <div class="layout">
      <section class="overview" id="overview" aria-label="照片总览"></section>
      <aside class="filters" id="filters" aria-label="照片筛选"></aside>
    </div>

    <footer class="foot">Photos shot by <a href="https://abnerzhao.com">Abner Zhao</a></footer>
  </main>

  <script src="data.js"></script>
  <script>
    const overview = document.querySelector('#overview');
    const filters = document.querySelector('#filters');
    let activeFilter = { type: 'all', value: 'all' };

    function allPhotos() {
      return window.photoEntries.flatMap((entry, entryIndex) => entry.photos.map((photo, photoIndex) => ({
        ...photo,
        title: entry.title,
        year: entry.date.slice(0, 4),
        location: entry.location,
        camera: photo.camera || entry.camera,
        url: `timeline.html#photo-${entryIndex}-${photoIndex}`
      })));
    }

    function unique(values) {
      return [...new Set(values)];
    }

    function matches(photo) {
      if (activeFilter.type === 'all') return true;
      return photo[activeFilter.type] === activeFilter.value;
    }

    function renderOverview() {
      const photos = allPhotos().filter(matches);
      overview.innerHTML = photos.map((photo) => `
        <a href="${photo.url}" aria-label="查看 ${photo.title}">
          <img src="${photo.src}" alt="${photo.alt}" loading="eager">
        </a>
      `).join('');
      renderFilters(photos.length);
    }

    function button(type, value, label) {
      const active = activeFilter.type === type && activeFilter.value === value ? ' is-active' : '';
      return `<button class="filter-button${active}" type="button" data-type="${type}" data-value="${value}">${label}</button>`;
    }

    function group(title, items, type) {
      return `
        <section class="filter-group">
          <div class="filter-title">${title}</div>
          <div class="filter-options">
            ${items.map((item) => button(type, item, item)).join('')}
          </div>
        </section>
      `;
    }

    function renderFilters(count) {
      const photos = allPhotos();
      const years = unique(photos.map((photo) => photo.year)).sort((a, b) => b.localeCompare(a));
      const locations = unique(photos.map((photo) => photo.location));
      const cameras = unique(photos.map((photo) => photo.camera));

      filters.innerHTML = [
        `<section class="filter-group">
          <div class="filter-options">${button('all', 'all', 'RECENTS')}</div>
          <div class="summary">${count} PHOTOS</div>
        </section>`,
        group('YEARS', years, 'year'),
        group('LOCATIONS', locations, 'location'),
        group('CAMERAS', cameras, 'camera')
      ].join('');
    }

    filters.addEventListener('click', (event) => {
      const target = event.target.closest('.filter-button');
      if (!target) return;
      activeFilter = {
        type: target.dataset.type,
        value: target.dataset.value
      };
      renderOverview();
    });

    renderOverview();
  </script>
</body>
</html>
