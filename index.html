<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f7f7f4">
  <title>Photo Notes</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg: #f7f7f4;
      --ink: #171717;
      --muted: #6f6f6a;
      --faint: #a8a8a1;
      --line: #dfded8;
      --chip: #eeeeea;
      --accent: #1f5f55;
      --mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      --sans: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--sans);
      letter-spacing: 0;
    }

    button {
      border: 0;
      font: inherit;
      cursor: pointer;
    }

    img {
      display: block;
      max-width: 100%;
    }

    .page {
      width: min(100%, 780px);
      margin: 0 auto;
      padding: 36px 20px 64px;
    }

    .site-head {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 24px;
      align-items: end;
      border-bottom: 1px solid var(--line);
      padding-bottom: 24px;
    }

    h1 {
      margin: 0;
      font-size: clamp(30px, 7vw, 54px);
      font-weight: 760;
      line-height: 0.98;
      letter-spacing: 0;
    }

    .intro {
      max-width: 520px;
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.75;
    }

    .site-meta {
      color: var(--faint);
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.7;
      text-align: right;
      white-space: nowrap;
    }

    .filters {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      margin: 0 -20px;
      padding: 16px 20px;
      border-bottom: 1px solid rgba(223, 222, 216, 0.72);
      background: rgba(247, 247, 244, 0.88);
      backdrop-filter: blur(14px);
      scrollbar-width: none;
    }

    .filters::-webkit-scrollbar {
      display: none;
    }

    .filter {
      flex: 0 0 auto;
      min-height: 34px;
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      padding: 0 12px;
      font-size: 14px;
      transition: background 140ms ease, color 140ms ease, transform 140ms ease;
    }

    .filter:hover,
    .filter.is-active {
      background: var(--ink);
      color: #fff;
    }

    .filter:active {
      transform: translateY(1px);
    }

    .feed {
      display: grid;
      gap: 42px;
      padding-top: 34px;
    }

    .post {
      display: grid;
      grid-template-columns: 86px minmax(0, 1fr);
      gap: 22px;
      align-items: start;
    }

    .post.is-hidden {
      display: none;
    }

    .date {
      position: sticky;
      top: 82px;
      color: var(--faint);
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.45;
    }

    .entry {
      min-width: 0;
      border-bottom: 1px solid var(--line);
      padding-bottom: 42px;
    }

    .entry img {
      width: 100%;
      max-height: 780px;
      border-radius: 4px;
      background: #e5e4df;
      object-fit: cover;
    }

    .entry h2 {
      margin: 18px 0 0;
      font-size: clamp(22px, 4.8vw, 34px);
      font-weight: 720;
      line-height: 1.12;
      letter-spacing: 0;
    }

    .entry p {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.78;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .meta span {
      border-radius: 999px;
      background: var(--chip);
      color: var(--muted);
      padding: 6px 9px;
      font-family: var(--mono);
      font-size: 11px;
      line-height: 1;
    }

    .tag {
      color: var(--accent) !important;
    }

    .empty {
      display: none;
      border: 1px dashed var(--line);
      border-radius: 4px;
      padding: 28px;
      color: var(--muted);
      font-size: 14px;
    }

    .empty.is-visible {
      display: block;
    }

    .foot {
      padding-top: 12px;
      color: var(--faint);
      font-family: var(--mono);
      font-size: 12px;
    }

    @media (max-width: 680px) {
      .page {
        padding: 26px 16px 48px;
      }

      .site-head {
        grid-template-columns: 1fr;
        gap: 14px;
      }

      .site-meta {
        text-align: left;
      }

      .filters {
        margin: 0 -16px;
        padding-right: 16px;
        padding-left: 16px;
      }

      .post {
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .date {
        position: static;
      }

      .entry {
        padding-bottom: 34px;
      }

      .entry img {
        max-height: none;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="site-head">
      <div>
        <h1>Photo Notes</h1>
        <p class="intro">个人摄影记录。像发一条轻微博一样，把照片、时间、地点、器材和当时的几句话放在一起。</p>
      </div>
      <div class="site-meta">
        RECENT PHOTOS<br>
        SHANGHAI / TRAVEL
      </div>
    </header>

    <nav class="filters" aria-label="按主题筛选">
      <button class="filter is-active" type="button" data-filter="all">全部</button>
      <button class="filter" type="button" data-filter="street">街头</button>
      <button class="filter" type="button" data-filter="travel">旅行</button>
      <button class="filter" type="button" data-filter="nature">自然</button>
      <button class="filter" type="button" data-filter="night">夜晚</button>
    </nav>

    <section class="feed" id="feed" aria-label="照片时间线"></section>
    <div class="empty" id="empty">这个分类暂时没有照片。</div>

    <footer class="foot">静态页面 · 照片数据在 index.html 的 photos 数组里</footer>
  </main>

  <script>
    const photos = [
      {
        title: '巷口的雨停了',
        date: '2026.06.12',
        tag: 'street',
        tagLabel: '街头',
        location: '上海 · 武康路',
        camera: 'Fujifilm X100VI',
        exif: '23mm · f/2.8 · 1/250 · ISO 400',
        text: '雨后十分钟，路面反光还在。行人开始从屋檐下走出来，整条街慢慢恢复声音。',
        src: 'https://picsum.photos/seed/photo-stream-after-rain-street/1400/1050',
        alt: '雨后街道路面反光与行人'
      },
      {
        title: '山腰的风',
        date: '2026.05.30',
        tag: 'nature',
        tagLabel: '自然',
        location: '浙江 · 莫干山',
        camera: 'Sony A7C II',
        exif: '55mm · f/4 · 1/500 · ISO 200',
        text: '云压得很低，树被风吹成同一个方向。没有等到日落，但这张更像那天的天气。',
        src: 'https://picsum.photos/seed/photo-stream-mountain-wind/1400/1100',
        alt: '山坡树木与低云'
      },
      {
        title: '夜车窗口',
        date: '2026.05.18',
        tag: 'night',
        tagLabel: '夜晚',
        location: '杭州 · 东站',
        camera: 'Ricoh GR IIIx',
        exif: '40mm · f/2.8 · 1/80 · ISO 1250',
        text: '车厢里的灯和站台广告牌叠在一起，玻璃把两个空间压成一张平面。',
        src: 'https://picsum.photos/seed/photo-stream-night-train-window/1400/1000',
        alt: '夜晚列车窗口与站台灯光倒影'
      },
      {
        title: '海边白墙',
        date: '2026.04.27',
        tag: 'travel',
        tagLabel: '旅行',
        location: '福建 · 平潭',
        camera: 'Nikon Zf',
        exif: '35mm · f/5.6 · 1/1000 · ISO 100',
        text: '午后的光很硬，白墙把阴影切得很清楚。海没有入镜，但风和盐味都在。',
        src: 'https://picsum.photos/seed/photo-stream-white-wall-sea/1400/1100',
        alt: '海边白墙与清晰阴影'
      },
      {
        title: '便利店门口',
        date: '2026.04.03',
        tag: 'street',
        tagLabel: '街头',
        location: '上海 · 长乐路',
        camera: 'Leica Q3',
        exif: '28mm · f/1.7 · 1/160 · ISO 800',
        text: '晚上十一点，便利店像一只小灯箱。路过的人都没有停下，但每个人都被照亮了一秒。',
        src: 'https://picsum.photos/seed/photo-stream-convenience-store/1400/1000',
        alt: '夜晚便利店门口与行人'
      },
      {
        title: '湖面没有风',
        date: '2026.03.21',
        tag: 'nature',
        tagLabel: '自然',
        location: '江苏 · 苏州',
        camera: 'Canon R6 II',
        exif: '70mm · f/4 · 1/640 · ISO 100',
        text: '水面平得像纸，远处的树影被压得很薄。那天没有特别的事情发生，所以记得更清楚。',
        src: 'https://picsum.photos/seed/photo-stream-still-lake/1400/1050',
        alt: '平静湖面与远处树影'
      }
    ];

    const feed = document.querySelector('#feed');
    const empty = document.querySelector('#empty');
    const filters = [...document.querySelectorAll('.filter')];

    function render() {
      feed.innerHTML = photos.map((photo, index) => `
        <article class="post" data-tag="${photo.tag}">
          <time class="date" datetime="${photo.date.replaceAll('.', '-')}">${photo.date}<br>${photo.tagLabel}</time>
          <div class="entry">
            <img src="${photo.src}" alt="${photo.alt}" loading="${index < 2 ? 'eager' : 'lazy'}">
            <h2>${photo.title}</h2>
            <p>${photo.text}</p>
            <div class="meta" aria-label="拍摄信息">
              <span>${photo.location}</span>
              <span>${photo.camera}</span>
              <span>${photo.exif}</span>
              <span class="tag">#${photo.tagLabel}</span>
            </div>
          </div>
        </article>
      `).join('');
    }

    function filterBy(tag) {
      let count = 0;

      document.querySelectorAll('.post').forEach((post) => {
        const visible = tag === 'all' || post.dataset.tag === tag;
        post.classList.toggle('is-hidden', !visible);
        if (visible) count += 1;
      });

      filters.forEach((button) => {
        button.classList.toggle('is-active', button.dataset.filter === tag);
      });

      empty.classList.toggle('is-visible', count === 0);
    }

    render();

    filters.forEach((button) => {
      button.addEventListener('click', () => filterBy(button.dataset.filter));
    });
  </script>
</body>
</html>
