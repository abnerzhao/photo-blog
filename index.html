<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f7f7f4">
  <title>Photo Notes</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg: #f7f7f4;
      --ink: #171717;
      --muted: #6f6f6a;
      --faint: #a8a8a1;
      --line: #dfded8;
      --mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      --sans: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--sans);
      letter-spacing: 0;
    }

    img {
      display: block;
      max-width: 100%;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      width: min(100%, 920px);
      margin: 0 auto;
      padding: 32px 20px 64px;
    }

    .site-head {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 18px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      font-weight: 720;
      line-height: 1.15;
      letter-spacing: 0;
    }

    .site-meta,
    .nav-link,
    .foot {
      color: var(--faint);
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.4;
    }

    .site-meta {
      margin-top: 6px;
    }

    .nav-link:hover {
      color: var(--ink);
    }

    .overview {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 6px;
      padding-top: 22px;
    }

    .overview a {
      display: block;
      overflow: hidden;
      border-radius: 3px;
      background: #e5e4df;
      aspect-ratio: 1;
    }

    .overview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: opacity 140ms ease;
    }

    .overview a:hover img {
      opacity: 0.78;
    }

    .foot {
      border-top: 1px solid var(--line);
      margin-top: 28px;
      padding-top: 14px;
    }

    @media (max-width: 680px) {
      .page {
        padding: 26px 16px 48px;
      }

      .site-head {
        align-items: flex-start;
        flex-direction: column;
        gap: 12px;
        padding-bottom: 16px;
      }

      .overview {
        grid-template-columns: repeat(3, 1fr);
        gap: 5px;
        padding-top: 18px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="site-head">
      <div>
        <h1>Photo Notes</h1>
        <div class="site-meta">OVERVIEW</div>
      </div>
      <a class="nav-link" href="timeline.html">TIMELINE</a>
    </header>

    <section class="overview" id="overview" aria-label="照片总览"></section>

    <footer class="foot">Photo Notes</footer>
  </main>

  <script src="data.js"></script>
  <script>
    const overview = document.querySelector('#overview');

    function allPhotos() {
      return window.photoEntries.flatMap((entry, entryIndex) => entry.photos.map((photo, photoIndex) => ({
        ...photo,
        url: `timeline.html#photo-${entryIndex}-${photoIndex}`
      })));
    }

    overview.innerHTML = allPhotos().map((photo) => `
      <a href="${photo.url}" aria-label="查看 ${photo.title}">
        <img src="${photo.src}" alt="${photo.alt}" loading="eager">
      </a>
    `).join('');
  </script>
</body>
</html>
